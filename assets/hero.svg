<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070f"/>
      <stop offset="50%" stop-color="#0a0814"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
    <radialGradient id="left-orb" cx="20%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="right-orb" cx="80%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-orb" cx="50%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c7d2fe"/>
      <stop offset="70%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="border-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(99,102,241,0)"/>
      <stop offset="30%" stop-color="rgba(99,102,241,0.5)"/>
      <stop offset="70%" stop-color="rgba(6,182,212,0.5)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0)"/>
    </linearGradient>
    <linearGradient id="border-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="800" height="120" fill="url(#hero-bg)"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="1">
    <line x1="0" y1="30" x2="800" y2="30"/><line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="80" y1="0" x2="80" y2="120"/><line x1="160" y1="0" x2="160" y2="120"/><line x1="240" y1="0" x2="240" y2="120"/>
    <line x1="320" y1="0" x2="320" y2="120"/><line x1="400" y1="0" x2="400" y2="120"/><line x1="480" y1="0" x2="480" y2="120"/>
    <line x1="560" y1="0" x2="560" y2="120"/><line x1="640" y1="0" x2="640" y2="120"/><line x1="720" y1="0" x2="720" y2="120"/>
  </g>
  <!-- Orbs -->
  <rect width="800" height="120" fill="url(#left-orb)"/>
  <rect width="800" height="120" fill="url(#right-orb)"/>
  <rect width="800" height="120" fill="url(#center-orb)"/>

  <!-- Border lines -->
  <rect x="0" y="0" width="800" height="1" fill="url(#border-top)"/>
  <rect x="0" y="119" width="800" height="1" fill="url(#border-bot)"/>

  <!-- Corner accents -->
  <path d="M 0 20 L 0 0 L 20 0" stroke="rgba(99,102,241,0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 780 0 L 800 0 L 800 20" stroke="rgba(6,182,212,0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 0 100 L 0 120 L 20 120" stroke="rgba(99,102,241,0.2)" stroke-width="1.5" fill="none"/>
  <path d="M 780 120 L 800 120 L 800 100" stroke="rgba(6,182,212,0.2)" stroke-width="1.5" fill="none"/>

  <!-- Floating dots -->
  <circle cx="50" cy="30" r="1.5" fill="#6366f1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="90" r="1.5" fill="#06b6d4" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="90" r="1" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="30" r="1" fill="#f472b6" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Main title -->
  <text x="400" y="56" text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="42" font-weight="800" letter-spacing="-2"
    fill="url(#title-grad)">@kayf/ui</text>

  <!-- Subtitle -->
  <text x="400" y="82" text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="13" font-weight="400" letter-spacing="0.5"
    fill="rgba(232,232,240,0.35)">Premium Dark Glassmorphism Web Components</text>

  <!-- Version badge -->
  <rect x="358" y="91" width="84" height="18" rx="9" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <circle cx="373" cy="100" r="3" fill="#6366f1">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="400" y="104" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#6366f1" letter-spacing="0.5">v0.2.3 · 8 components</text>
</svg>
