<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.2 -0.1; 0.2 0.1; -0.2 -0.1" dur="4s" repeatCount="indefinite"/>
    </radialGradient>
    <filter id="glow-indigo">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="200" y="20" width="400" height="160" rx="16"/>
    </clipPath>
    <linearGradient id="top-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg-grad)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/><line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/><line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/><line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Card -->
  <rect x="200" y="20" width="400" height="160" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Spotlight fill -->
  <rect x="200" y="20" width="400" height="160" rx="16" fill="url(#spotlight)" clip-path="url(#card-clip)"/>
  <!-- Top border glow -->
  <rect x="200" y="20" width="400" height="1" rx="1" fill="url(#top-line)"/>

  <!-- Content -->
  <text x="400" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#e8e8f0" letter-spacing="-0.5">SpotlightCard</text>
  <text x="400" y="116" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="rgba(232,232,240,0.4)">Mouse-tracking radial spotlight</text>

  <!-- Tag -->
  <rect x="348" y="130" width="104" height="22" rx="11" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="400" y="145" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#6366f1">v0.1.0</text>

  <!-- Side labels -->
  <text x="60" y="105" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.15)" transform="rotate(-90 60 105)">@kayf/ui</text>
  <text x="740" y="105" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.15)" transform="rotate(90 740 105)">@kayf/ui</text>
</svg>
