<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#08050e"/>
    </linearGradient>
    <linearGradient id="val-grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="val-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="val-grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="val-grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg3)"/>
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- ═══ CARD 1 — Active Users (5 values, cycle=10s, each slot=2s=20%) ═══ -->
  <rect x="30" y="25" width="165" height="150" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="30" y="25" width="165" height="1" fill="#6366f122"/>
  <rect x="30" y="174" width="0" height="2" rx="1" fill="#6366f1">
    <animate attributeName="width" from="0" to="165" dur="2s" begin="0.2s" fill="freeze"/>
  </rect>
  <circle cx="165" cy="175" r="40" fill="#6366f1" opacity="0.08" filter="url(#glow-sm)"/>
  <text x="55" y="68" font-family="'Segoe UI', sans-serif" font-size="14" fill="#6366f188">◎</text>
  <text x="112" y="135" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="rgba(232,232,240,0.35)" letter-spacing="1">ACTIVE USERS</text>

  <!--
    Each number owns exactly [slotStart, slotEnd).
    Within its slot: start invisible → fade in → hold → fade out → invisible until next slot.
    Gap: the 2% before the next slot's start — ensures zero overlap.
    Slot 0%:  0→20%   visible 1%→18%
    Slot 20%: 20→40%  visible 21%→38%
    Slot 40%: 40→60%  visible 41%→58%
    Slot 60%: 60→80%  visible 61%→78%
    Slot 80%: 80→100% visible 81%→98%
  -->
  <text x="112" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad1)" letter-spacing="-1" opacity="0">
    0+
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;    0.01; 0.10; 0.18; 0.20; 1.0"
      values=  "0;    1;    1;    0;    0;    0"/>
  </text>
  <text x="112" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad1)" letter-spacing="-1" opacity="0">
    24k+
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.20; 0.21; 0.30; 0.38; 0.40; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="112" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad1)" letter-spacing="-1" opacity="0">
    49k+
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.40; 0.41; 0.50; 0.58; 0.60; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="112" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad1)" letter-spacing="-1" opacity="0">
    74k+
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.60; 0.61; 0.70; 0.78; 0.80; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="112" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad1)" letter-spacing="-1" opacity="0">
    98.7k+
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.80; 0.81; 0.90; 0.98; 1.0"
      values=  "0; 0;   1;    1;    0;    0"/>
  </text>

  <!-- ═══ CARD 2 — Avg Rating (4 values, cycle=8s, slot=2s=25%) ═══ -->
  <rect x="213" y="25" width="165" height="150" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="213" y="25" width="165" height="1" fill="#f472b622"/>
  <rect x="213" y="174" width="0" height="2" rx="1" fill="#f472b6">
    <animate attributeName="width" from="0" to="165" dur="2s" begin="0.5s" fill="freeze"/>
  </rect>
  <circle cx="348" cy="175" r="40" fill="#f472b6" opacity="0.07" filter="url(#glow-sm)"/>
  <text x="238" y="68" font-family="'Segoe UI', sans-serif" font-size="14" fill="#f472b688">◈</text>
  <text x="295" y="135" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="rgba(232,232,240,0.35)" letter-spacing="1">AVG RATING</text>

  <text x="295" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad2)" letter-spacing="-1" opacity="0">
    0.0
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;    0.01; 0.12; 0.22; 0.25; 1.0"
      values=  "0;    1;    1;    0;    0;    0"/>
  </text>
  <text x="295" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad2)" letter-spacing="-1" opacity="0">
    2.4
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.25; 0.26; 0.37; 0.47; 0.50; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="295" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad2)" letter-spacing="-1" opacity="0">
    3.8
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.50; 0.51; 0.62; 0.72; 0.75; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="295" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad2)" letter-spacing="-1" opacity="0">
    4.9
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.75; 0.76; 0.87; 0.97; 1.0"
      values=  "0; 0;   1;    1;    0;    0"/>
  </text>

  <!-- ═══ CARD 3 — Response Time (4 values, cycle=9s, slot=2.25s=25%) ═══ -->
  <rect x="396" y="25" width="165" height="150" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="396" y="25" width="165" height="1" fill="#06b6d422"/>
  <rect x="396" y="174" width="0" height="2" rx="1" fill="#06b6d4">
    <animate attributeName="width" from="0" to="165" dur="2s" begin="0.8s" fill="freeze"/>
  </rect>
  <circle cx="531" cy="175" r="40" fill="#06b6d4" opacity="0.07" filter="url(#glow-sm)"/>
  <text x="421" y="68" font-family="'Segoe UI', sans-serif" font-size="14" fill="#06b6d488">◇</text>
  <text x="478" y="135" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="rgba(232,232,240,0.35)" letter-spacing="1">RESPONSE TIME</text>

  <text x="478" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad3)" letter-spacing="-1" opacity="0">
    0ms
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;    0.01; 0.12; 0.22; 0.25; 1.0"
      values=  "0;    1;    1;    0;    0;    0"/>
  </text>
  <text x="478" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad3)" letter-spacing="-1" opacity="0">
    45ms
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.25; 0.26; 0.37; 0.47; 0.50; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="478" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad3)" letter-spacing="-1" opacity="0">
    92ms
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.50; 0.51; 0.62; 0.72; 0.75; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="478" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad3)" letter-spacing="-1" opacity="0">
    127ms
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.75; 0.76; 0.87; 0.97; 1.0"
      values=  "0; 0;   1;    1;    0;    0"/>
  </text>

  <!-- ═══ CARD 4 — Uptime SLA (4 values, cycle=10s, slot=2.5s=25%) ═══ -->
  <rect x="579" y="25" width="165" height="150" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="579" y="25" width="165" height="1" fill="#10b98122"/>
  <rect x="579" y="174" width="0" height="2" rx="1" fill="#10b981">
    <animate attributeName="width" from="0" to="165" dur="2s" begin="1.1s" fill="freeze"/>
  </rect>
  <circle cx="714" cy="175" r="40" fill="#10b981" opacity="0.07" filter="url(#glow-sm)"/>
  <text x="604" y="68" font-family="'Segoe UI', sans-serif" font-size="14" fill="#10b98188">◉</text>
  <text x="661" y="135" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="rgba(232,232,240,0.35)" letter-spacing="1">UPTIME SLA</text>

  <text x="661" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad4)" letter-spacing="-1" opacity="0">
    0%
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;    0.01; 0.12; 0.22; 0.25; 1.0"
      values=  "0;    1;    1;    0;    0;    0"/>
  </text>
  <text x="661" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad4)" letter-spacing="-1" opacity="0">
    33.3%
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.25; 0.26; 0.37; 0.47; 0.50; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="661" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad4)" letter-spacing="-1" opacity="0">
    66.6%
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.50; 0.51; 0.62; 0.72; 0.75; 1.0"
      values=  "0; 0;   1;    1;    0;    0;    0"/>
  </text>
  <text x="661" y="112" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#val-grad4)" letter-spacing="-1" opacity="0">
    99.9%
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0; 0.75; 0.76; 0.87; 0.97; 1.0"
      values=  "0; 0;   1;    1;    0;    0"/>
  </text>
</svg>
